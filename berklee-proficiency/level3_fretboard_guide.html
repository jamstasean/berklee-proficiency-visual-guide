<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 3 — 기타 지판 학습 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ede7d9;
  --bg3: #e4dccb;
  --ink: #1a1710;
  --ink2: #3d3828;
  --ink3: #6b6452;
  --ink4: #9a9080;
  --accent: #8b4513;
  --accent2: #2c5f8a;
  --accent3: #4a7c59;
  --gold: #c49a3c;
  --red: #a63228;
  --border: #c8bfa8;
  --string1: #8b7355;
  --string6: #5a4a35;
  --nut: #2c2820;
  --fret: #9a8f7a;
  --dot-root: #a63228;
  --dot-note: #2c5f8a;
  --dot-text: #f5f0e8;
  --shadow: rgba(26,23,16,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  padding: 28px 32px 20px;
  border-bottom: 2px solid var(--border);
  background: var(--bg2);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.title-block h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: var(--accent);
  letter-spacing: 0.01em;
  line-height: 1.1;
}

.title-block h1 em {
  font-style: italic;
  color: var(--ink3);
  font-size: 22px;
}

.title-block p {
  font-size: 12px;
  color: var(--ink4);
  font-family: 'IBM Plex Mono', monospace;
  margin-top: 4px;
  letter-spacing: 0.06em;
}

.header-legend {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--ink3);
  font-family: 'IBM Plex Mono', monospace;
}

.legend-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--dot-text);
}

.ld-root { background: var(--dot-root); }
.ld-note { background: var(--dot-note); }
.ld-open { background: var(--bg); border: 2px solid var(--dot-note); color: var(--dot-note); }

/* ── SECTION TABS ── */
.section-nav {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 32px 0;
  display: flex;
  gap: 2px;
  border-bottom: 2px solid var(--border);
}

.sec-tab {
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 2px solid transparent;
  border-bottom: none;
  background: transparent;
  color: var(--ink4);
  font-family: 'IBM Plex Sans KR', sans-serif;
  border-radius: 6px 6px 0 0;
  transition: all 0.15s;
  letter-spacing: 0.01em;
  position: relative;
  bottom: -2px;
}

.sec-tab:hover { color: var(--ink2); background: var(--bg3); }

.sec-tab.active {
  background: var(--bg);
  color: var(--accent);
  border-color: var(--border);
  font-weight: 700;
}

/* ── KEY SELECTOR ── */
.key-bar {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.key-label {
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--ink4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 6px;
}

.key-btn {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--ink2);
  font-size: 13px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.key-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg); }

.key-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(139,69,19,0.3);
}

/* ── VIEW TOGGLE ── */
.view-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 8px;
  padding-left: 16px;
  border-left: 1px solid var(--border);
}

.view-btn {
  padding: 7px 16px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--ink3);
  font-size: 12px;
  font-family: 'IBM Plex Sans KR', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.view-btn:hover { border-color: var(--accent2); color: var(--accent2); }

.view-btn.active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(44,95,138,0.3);
}

/* ── MAIN ── */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}

/* ── SECTION PANEL ── */
.sec-panel { display: none; }
.sec-panel.active { display: block; }

/* ── DIAGRAM GROUP ── */
.diagram-group {
  margin-bottom: 36px;
}

.group-title {
  font-family: 'IBM Plex Sans KR', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-variant-numeric: lining-nums;
  line-height: 1.4;
}

.group-subtitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--ink4);
  font-weight: 400;
  font-variant-numeric: lining-nums;
  vertical-align: middle;
}

.diagrams-row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

/* ── FRETBOARD CARD ── */
.fb-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px 14px;
  box-shadow: 0 2px 10px var(--shadow);
  min-width: 0;
}

.fb-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink2);
  margin-bottom: 4px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.04em;
}

.fb-card-sub {
  font-size: 11px;
  color: var(--ink4);
  margin-bottom: 10px;
  font-family: 'IBM Plex Mono', monospace;
}

/* ── SVG FRETBOARD ── */
.fretboard-svg {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
}

/* ── NOTE INFO ── */
.note-row {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.note-chip {
  padding: 2px 9px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--ink3);
}

.note-chip.root {
  background: var(--dot-root);
  color: #fff;
  border-color: var(--dot-root);
}

/* ── FORMULA BOX ── */
.formula-box {
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg3);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  color: var(--ink3);
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1.7;
}

.formula-box strong { color: var(--ink2); }

/* ── HINT BOX ── */
.hint-box {
  margin-top: 10px;
  padding: 9px 14px;
  background: #f0ede4;
  border-left: 3px solid var(--accent3);
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  color: var(--ink3);
  line-height: 1.6;
}

.hint-box strong { color: var(--ink2); }

/* ── VOICING SECTION ── */
.voicing-section {
  margin-top: 18px;
  padding: 16px 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.voicing-section-title {
  font-family: 'IBM Plex Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 6px;
}

.voicing-section-sub {
  font-size: 12px;
  color: var(--ink4);
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 14px;
  line-height: 1.5;
}

.voicing-note {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: 6px;
  font-size: 11px;
  color: var(--ink3);
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1.6;
  min-height: 18px;
}

.voicing-note strong { color: var(--accent); }

/* ── VOICING CONTROLS ── */
.voicing-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.voicing-ctrl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.voicing-ctrl-label {
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--ink4);
  min-width: 40px;
  letter-spacing: 0.04em;
}

/* 현 세트 버튼 — 크고 명확하게 */
.voicing-set-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--bg3);
  color: var(--ink2);
  font-size: 15px;
  font-family: 'IBM Plex Sans KR', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
  line-height: 1.3;
}

.voicing-set-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #f5ede4;
}

.voicing-set-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(122,76,44,0.25);
}

/* 전위 버튼 — 현 세트보다 작고 차분하게 */
.voicing-inv-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg3);
  color: var(--ink3);
  font-size: 12px;
  font-family: 'IBM Plex Sans KR', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.voicing-inv-btn:hover {
  border-color: var(--accent2);
  color: var(--accent2);
}

.voicing-inv-btn.active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
  font-weight: 600;
}

.voicing-display {
  margin-bottom: 10px;
  min-height: 120px;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  header { padding: 18px 16px 14px; }
  .section-nav, .key-bar, main { padding-left: 16px; padding-right: 16px; }
  .sec-tab { padding: 8px 14px; font-size: 12px; }
}
</style>

<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Level III <em>— 기타 지판 학습 가이드</em></h1>
      <p>Berklee Guitar Proficiency · 노션기타 Notion GTR 2.0 · Keys: C · F · Bb · Eb · G · D · A</p>
    </div>
    <div class="header-legend">
      <div class="legend-item">
        <div class="legend-dot ld-root">R</div>
        <span class="legend-root-label">루트음</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot ld-note">●</div>
        <span>스케일음</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot ld-open">O</div>
        <span>개방현</span>
      </div>
    </div>
  </div>
</header>

<nav class="section-nav">
  <button class="sec-tab active" onclick="switchSection('scales')">🎼 스케일</button>
  <button class="sec-tab" onclick="switchSection('triads')">🎸 3화음 코드</button>
  <button class="sec-tab" onclick="switchSection('fourpart')">🎵 4성부 화음</button>
</nav>

<div class="key-bar">
  <span class="key-label">Key →</span>
  <button class="key-btn active" onclick="selectKey('C')">C</button>
  <button class="key-btn" onclick="selectKey('F')">F</button>
  <button class="key-btn" onclick="selectKey('Bb')">B♭</button>
  <button class="key-btn" onclick="selectKey('Eb')">E♭</button>
  <button class="key-btn" onclick="selectKey('G')">G</button>
  <button class="key-btn" onclick="selectKey('D')">D</button>
  <button class="key-btn" onclick="selectKey('A')">A</button>

  <div class="view-toggle" id="viewToggle">
    <span class="key-label" style="margin-left:12px">표시 →</span>
    <button class="view-btn active" data-mode="note"  onclick="setViewMode('note')">음이름</button>
    <button class="view-btn"        data-mode="degree" onclick="setViewMode('degree')">도수</button>
  </div>
</div>

<main>
  <div id="panel-scales" class="sec-panel active"></div>
  <div id="panel-triads" class="sec-panel"></div>
  <div id="panel-fourpart" class="sec-panel"></div>
</main>

<script>
// ════════════════════════════════════════════════
// MUSIC THEORY ENGINE
// ════════════════════════════════════════════════

// Standard tuning: E2 A2 D3 G3 B3 E4
// Represented as semitone offset from C0
const OPEN_STRINGS = [4, 9, 14, 19, 23, 28]; // E A D G B E (low to high)
// String index 0 = low E (6th string), 5 = high E (1st string)

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_NAMES_FLAT = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// 음계 도수 순서: C D E F G A B (diatonic letter names)
const DIATONIC_LETTERS = ['C','D','E','F','G','A','B'];
// 각 음이름의 기본 반음 위치 (sharps/flats 없는 자연음)
const NATURAL_SEMITONES = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};

function noteToSemitone(note) {
  const map = {
    'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
    'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11
  };
  return map[note] ?? 0;
}

// ─────────────────────────────────────────────────────
// 핵심 함수: 루트음 + 인터벌 도수 → 올바른 음이름
// 화성학 규칙: 같은 도수 내에서 변화기호(#/b)로 표현
// 예) C + 단3도(b3) = Eb (D#이 아님)
// ─────────────────────────────────────────────────────
function intervalToNoteName(rootNote, intervalSemitones, degreeOffset) {
  // rootNote: 'C', 'F#', 'Bb' 등
  // intervalSemitones: 0~11 (반음 수)
  // degreeOffset: 0=루트, 1=2도, 2=3도, 3=4도, 4=5도, 5=6도, 6=7도 (0-indexed)

  // 루트의 letter index 찾기
  const rootLetter = rootNote.replace(/[#b]/g, '');
  const rootIdx = DIATONIC_LETTERS.indexOf(rootLetter);
  if (rootIdx === -1) return rootNote;

  // 목표 도수의 letter
  const targetIdx = (rootIdx + degreeOffset) % 7;
  const targetLetter = DIATONIC_LETTERS[targetIdx];

  // 루트 반음값
  const rootSt = noteToSemitone(rootNote);
  // 목표 반음값 (루트 기준)
  const targetSt = ((rootSt + intervalSemitones) % 12 + 12) % 12;
  // 목표 letter의 자연음 반음값
  const naturalSt = NATURAL_SEMITONES[targetLetter];

  // 차이 계산 → 변화기호 결정
  let diff = ((targetSt - naturalSt) + 12) % 12;
  // diff를 -1~+1 범위로 정규화 (더블샤프/더블플랫은 최대 2까지)
  if (diff > 6) diff -= 12;

  if (diff === 0)  return targetLetter;
  if (diff === 1)  return targetLetter + '#';
  if (diff === 2)  return targetLetter + '##';
  if (diff === -1) return targetLetter + 'b';
  if (diff === -2) return targetLetter + 'bb';
  // 그 외 fallback
  return targetLetter + (diff > 0 ? '#' : 'b');
}

// 코드 타입별 degree offset 매핑
// 각 인터벌이 몇 도인지 (0-indexed: 0=1도, 1=2도, 2=3도...)
const INTERVAL_DEGREES = {
  'Maj':      [0, 2, 4],           // 1 3 5
  'Min':      [0, 2, 4],           // 1 b3 5
  'Aug':      [0, 2, 4],           // 1 3 #5
  'Dim':      [0, 2, 4],           // 1 b3 b5
  'Maj7':     [0, 2, 4, 6],        // 1 3 5 7
  'Min7':     [0, 2, 4, 6],        // 1 b3 5 b7
  'Dom7':     [0, 2, 4, 6],        // 1 3 5 b7
  'Min7b5':   [0, 2, 4, 6],        // 1 b3 b5 b7
  'Dom7sus4': [0, 3, 4, 6],        // 1 4 5 b7
  '7#5':      [0, 2, 4, 6],        // 1 3 #5 b7
  'Dim7':     [0, 2, 4, 6],        // 1 b3 b5 bb7
  'Maj6':     [0, 2, 4, 5],        // 1 3 5 6
  'Min6':     [0, 2, 4, 5],        // 1 b3 5 6
  'Min9':     [0, 2, 4, 6, 1],     // 1 b3 5 b7 9
  '9':        [0, 2, 4, 6, 1],     // 1 3 5 b7 9
  '7b9':      [0, 2, 4, 6, 1],     // 1 3 5 b7 b9
  '7#9':      [0, 2, 4, 6, 1],     // 1 3 5 b7 #9
  '13':       [0, 2, 4, 6, 1, 5],  // 1 3 5 b7 9 13
};

// 코드 구성음 이름 배열 반환 (화성학적으로 정확한 표기)
function getChordNoteNames(rootNote, chordType) {
  const intervals = CHORD_INTERVALS[chordType];
  const degrees = INTERVAL_DEGREES[chordType] || intervals.map((_,i) => i);
  return intervals.map((iv, i) => {
    // 9도 이상은 mod 7로 처리 (2도=9도, 4도=11도, 6도=13도)
    const deg = degrees[i] !== undefined ? degrees[i] : i;
    return intervalToNoteName(rootNote, iv % 12, deg);
  });
}

// 스케일 구성음 이름 배열 (화성학적 표기)
function getScaleNoteNames(rootNote, scaleType) {
  const intervals = SCALES[scaleType];
  // major: 7음계 도수 0~6
  const degrees = scaleType === 'major' ? [0,1,2,3,4,5,6] : intervals.map((_,i)=>i);
  return intervals.map((iv, i) => intervalToNoteName(rootNote, iv, degrees[i] || i));
}

// 지판 위 음표 표기: 루트 + 반음 위치 → 가장 가까운 올바른 음이름
// (지판 전체 표시용 — 단순 플랫/샤프 선택)
function semitoneToNote(s, preferFlat=false) {
  return preferFlat ? NOTE_NAMES_FLAT[((s%12)+12)%12] : NOTE_NAMES[((s%12)+12)%12];
}

// 지판 표시용: 컨텍스트 기반 음이름 (해당 스케일/코드의 구성음이면 정확한 이름 반환)
function getContextualNoteName(semitone, rootNote, chordOrScaleIntervals, chordType) {
  const rootSt = noteToSemitone(rootNote);
  const relSt = ((semitone - rootSt) + 12) % 12;
  const ivIndex = chordOrScaleIntervals.map(iv => iv % 12).indexOf(relSt);
  if (ivIndex === -1) return semitoneToNote(semitone, !!USE_FLAT[rootNote]);
  if (chordType && INTERVAL_DEGREES[chordType]) {
    const deg = INTERVAL_DEGREES[chordType][ivIndex];
    return intervalToNoteName(rootNote, relSt, deg);
  }
  return semitoneToNote(semitone, !!USE_FLAT[rootNote]);
}



const CHORD_NAMES_KO = {
  // 3화음 (공통)
  'Maj':'장3화음','Min':'단3화음','Aug':'증3화음','Dim':'감3화음',
  // Level 3 four-part (Level 1과 동일 14종)

// ════════════════════════════════════════════════
// 인터랙티브 보이싱 폼 — 정확한 배치 순서 기반 자동 계산

const VOICING_SETS = {
  close: { '654':[6,5,4], '543':[5,4,3], '432':[4,3,2], '321':[3,2,1] },
  open:  { '643':[6,4,3], '542':[5,4,2] }
};

// ════════════════════════════════════════════════
// DROP 2/3 보이싱 엔진 (4성부 화음용)
// NotebookLM 버클리 기타 마스터 브레인 검증 완료
// ════════════════════════════════════════════════

// Drop 3: ⑥④③② (5번줄 뮤트) — absIdx [0,2,3,4]
// Drop 2: ⑤④③② — absIdx [1,2,3,4]
// 도수 인덱스: 0=1도(root), 1=3도, 2=5도, 3=7도
//
// Drop 3 배치패턴: i번 전위 = [i, (i+3)%4, (i+1)%4, (i+2)%4]
//   근음: [0,3,1,2] = 1도-7도-3도-5도 (C Maj7: C-B-E-G ✅)
// Drop 2 배치패턴: i번 전위 = [i, (i+2)%4, (i+3)%4, (i+1)%4]
//   근음: [0,2,3,1] = 1도-5도-7도-3도 (C Maj7: C-G-B-E ✅)

const DROP3_STRINGS = [0,2,3,4]; // ⑥④③② absIdx
const DROP2_STRINGS = [1,2,3,4]; // ⑤④③②

function getDrop3Order(invIdx) {
  const i = invIdx % 4;
  return [i%4, (i+3)%4, (i+1)%4, (i+2)%4];
}
function getDrop2Order(invIdx) {
  const i = invIdx % 4;
  return [i%4, (i+2)%4, (i+3)%4, (i+1)%4];
}

// Drop 보이싱 탐색
function findDropVoicing(tones, absIdxList, order) {
  const results = [];
  const bassAi = absIdxList[0];
  for (const bF of freetsOfNote(bassAi, tones[order[0]], 0, 18)) {
    let voicing = [{absIdx:bassAi, fret:bF, degIdx:order[0]}];
    let valid = true;
    for (let si = 1; si < absIdxList.length; si++) {
      const ai = absIdxList[si];
      const target = tones[order[si]];
      const minF = Math.max(0, bF-4), maxF = Math.min(18, bF+6);
      const cands = freetsOfNote(ai, target, minF, maxF);
      if (!cands.length) { valid=false; break; }
      cands.sort((a,b) => Math.abs(a-bF)-Math.abs(b-bF));
      voicing.push({absIdx:ai, fret:cands[0], degIdx:order[si]});
    }
    if (!valid) continue;
    const frets = voicing.map(v => v.fret);
    const span = Math.max(...frets) - Math.min(...frets);
    if (span <= 5) results.push({voicing, span, bF});
  }
  if (!results.length) return null;
  results.sort((a,b) => a.bF - b.bF || a.span - b.span);
  return results[0].voicing;
}

// Drop 폼 → voicingPos 변환 (makeFretboardSVG 입력 형식)
function dropVoicingToPos(voicing, baseIntervals, key) {
  const degOffsets = [0,2,4,6]; // 1도, 3도, 5도, 7도 letter offset
  const rootSt = noteToSemitone(key);
  return voicing.map(({absIdx, fret, degIdx}) => {
    const noteSt = ((OPEN_STRINGS[absIdx] + fret) % 12 + 12) % 12;
    const isRoot = noteSt === rootSt % 12;
    const noteNm = intervalToNoteName(key, baseIntervals[degIdx], degOffsets[degIdx]);
    const degLabels = ['1','3','5','7'];
    return {
      string: absIdx, fret, isRoot, isOpen: fret===0,
      note: noteNm, degree: degLabels[degIdx] || '',
    };
  });
}

// Drop 보이싱 섹션 HTML (지판 전체에 폼 표시)
function makeDropVoicingSection(chord, key, baseIntervals) {
  const rootSt = noteToSemitone(key);

    {label:'Drop 3 (⑥④③②)', absIdxList:DROP3_STRINGS, orderFn:getDrop3Order, strNums:[6,4,3,2]},
    {label:'Drop 2 (⑤④③②)', absIdxList:DROP2_STRINGS, orderFn:getDrop2Order, strNums:[5,4,3,2]},
  ];

  let html = `<div class="voicing-section">`;
  html += `<div class="voicing-section-title">🎸 Drop 보이싱 폼 <span style="font-weight:400;color:var(--ink4);font-size:11px">Level III 실기: 근음 포지션 2개 폼 필수</span></div>`;
  html += `<div class="voicing-section-sub">Drop 3 = 위에서 3번째 음을 옥타브 아래로 (⑥현 뮤트) · Drop 2 = 위에서 2번째 음을 옥타브 아래로</div>`;

  dropTypes.forEach(({label, absIdxList, orderFn, strNums}) => {
    html += `<div style="margin-bottom:18px">`;

    html += `<div style="display:flex;flex-wrap:wrap;gap:16px;">`;

    for (let inv = 0; inv < 4; inv++) {
      const v = findDropVoicing(tones, absIdxList, orderFn(inv));
      if (!v) {
        html += `<div style="font-size:11px;color:var(--ink4);padding:8px;">${invLabels[inv]}: 12프렛 이내 불가</div>`;
        continue;
      }
      const vPos = dropVoicingToPos(v, baseIntervals, key);
      const vFrets = v.map(p=>p.fret).filter(f=>f>0);
      const maxF = vFrets.length ? Math.max(...vFrets) : 4;
      const endFr = Math.max(15, maxF+1);
      const activeStrNums = new Set(strNums);

      // Level III 실기는 근음 포지션만 필수 — 강조 표시
      const isRequired = inv === 0;
      html += `<div style="flex:1;min-width:180px;">`;
      html += `<div style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:${isRequired?'var(--accent)':'var(--ink3)'};margin-bottom:6px;font-weight:${isRequired?'700':'400'}">`;
      html += `${invLabels[inv]}${isRequired?' ★실기 필수':''}`;
      html += `</div>`;
      html += makeFretboardSVG(vPos, {startFret:0, endFret:endFr, width:320, viewMode:currentViewMode, activeStrNums});
      html += `</div>`;
    }
    html += `</div></div>`;
  });

  html += `<div class="voicing-note">💡 <strong>실기 핵심:</strong> Drop 3(6번줄 루트)과 Drop 2(5번줄 루트) 근음 포지션 2개를 모든 키에서 즉각 연주할 수 있어야 합니다.</div>`;
  html += `</div>`;
  return html;
}

const SET_LABELS = {
  '654':'⑥⑤④ 현 세트', '543':'⑤④③ 현 세트',
  '432':'④③② 현 세트', '321':'③②① 현 세트',
  '643':'⑥④③ 현 세트', '542':'⑤④② 현 세트',
};
const INV_LABELS_MAP = { R:'근음 포지션', '1':'1전위 (3도 최저)', '2':'2전위 (5도 최저)' };

// ── 클로즈 보이싱 배치 순서 ─────────────────────────────
// 클로즈 = 1옥타브 이내, 최저음(Bass Note) 기준 전위
// Root [1-3-5]: bass=1도, mid=3도, top=5도
// 1st  [3-5-1]: bass=3도, mid=5도, top=1도
// 2nd  [5-1-3]: bass=5도, mid=1도, top=3도
// index: 0=root(1도), 1=3도, 2=5도
const CLOSE_ORDER = [[0,1,2],[1,2,0],[2,0,1]];

// ── 오픈 보이싱 배치 순서 ──────────────────────────────
// 오픈 = 클로즈의 가운데 음을 1옥타브 위로 올린 형태
// Root [1-5-3]: bass=1도, mid=5도, top=3도 (3도가 옥타브위로)
// 1st  [3-1-5]: bass=3도, mid=1도, top=5도
// 2nd  [5-3-1]: bass=5도, mid=3도, top=1도
const OPEN_ORDER = [[0,2,1],[1,0,2],[2,1,0]];

// ── 특정 현에서 목표 음의 프렛 위치 탐색 ──────────────
function freetsOfNote(ai, targetNote, minF, maxF) {
  const result = [];
  for (let f = minF; f <= maxF; f++) {
    if (((OPEN_STRINGS[ai] + f) % 12 + 12) % 12 === targetNote) result.push(f);
  }
  return result;
}

// ── 클로즈 보이싱 탐색 ─────────────────────────────────
// rootSt: 루트 반음값, strNums: [6,5,4] 형태
// invIdx: 0=근음, 1=1전위, 2=2전위
// baseIntervals: [0,4,7] (Maj), [0,3,7] (Min), [0,4,8] (Aug), [0,3,6] (Dim)
function findCloseVoicing(rootSt, strNums, invIdx, baseIntervals) {
  const tones = baseIntervals.map(i => (rootSt + i) % 12);
  const order = CLOSE_ORDER[invIdx];
  const absIdxList = strNums.map(n => 6 - n);
  const [bassAi, midAi, topAi] = absIdxList;
  const results = [];

  for (const bF of freetsOfNote(bassAi, tones[order[0]], 0, 12)) {
    // 위 현들은 bassFret -3 ~ +4 범위에서 탐색
    const minF = Math.max(0, bF - 3), maxF = bF + 4;
    for (const mF of freetsOfNote(midAi, tones[order[1]], minF, maxF)) {
      for (const tF of freetsOfNote(topAi, tones[order[2]], minF, maxF)) {
        const activeFrets = [bF, mF, tF].filter(f => f > 0);
        const span = activeFrets.length ? Math.max(...activeFrets) - Math.min(...activeFrets) : 0;
        if (span <= 4) {
          results.push({
            v: [
              {absIdx:bassAi, fret:bF, degIdx:order[0]},
              {absIdx:midAi,  fret:mF, degIdx:order[1]},
              {absIdx:topAi,  fret:tF, degIdx:order[2]},
            ],
            span, bF,
          });
        }
      }
    }
  }
  if (!results.length) return null;
  // 개방현 포함 폼은 후순위, 낮은 포지션 우선
  results.sort((a, b) => {
    const aO = a.v.some(x => x.fret === 0) ? 1 : 0;
    const bO = b.v.some(x => x.fret === 0) ? 1 : 0;
    return aO - bO || a.bF - b.bF || a.span - b.span;
  });
  return results[0].v;
}

// ── 오픈 보이싱 탐색 ────────────────────────────────────
function findOpenVoicing(rootSt, strNums, invIdx, baseIntervals) {
  const tones = baseIntervals.map(i => (rootSt + i) % 12);
  const order = OPEN_ORDER[invIdx];
  const absIdxList = strNums.map(n => 6 - n);
  const [bassAi, midAi, topAi] = absIdxList;
  const results = [];

  for (const bF of freetsOfNote(bassAi, tones[order[0]], 0, 12)) {
    // 오픈은 더 넓은 범위 (bassFret -4 ~ +8)
    const minF = Math.max(0, bF - 4), maxF = bF + 8;
    for (const mF of freetsOfNote(midAi, tones[order[1]], minF, maxF)) {
      for (const tF of freetsOfNote(topAi, tones[order[2]], minF, maxF)) {
        const activeFrets = [bF, mF, tF].filter(f => f > 0);
        const span = activeFrets.length ? Math.max(...activeFrets) - Math.min(...activeFrets) : 0;
        if (span <= 5) {
          results.push({
            v: [
              {absIdx:bassAi, fret:bF, degIdx:order[0]},
              {absIdx:midAi,  fret:mF, degIdx:order[1]},
              {absIdx:topAi,  fret:tF, degIdx:order[2]},
            ],
            span, bF,
          });
        }
      }
    }
  }
  if (!results.length) return null;
  results.sort((a, b) => a.bF - b.bF || a.span - b.span);
  return results[0].v;
}

// ── 통합 탐색 래퍼 ──────────────────────────────────────
function findVoicingAuto(rootSt, strNums, invIdx, voicingType, baseIntervals) {
  return voicingType === 'close'
    ? findCloseVoicing(rootSt, strNums, invIdx, baseIntervals)
    : findOpenVoicing(rootSt, strNums, invIdx, baseIntervals);
}

// 폼 포인트 → 6줄 다이어그램 SVG
function makeVoicingDiagramFromPositions(voicingPoints, strNums) {
  if (!voicingPoints) {
    return `<div style="width:118px;height:130px;display:flex;align-items:center;justify-content:center;
      background:#f0ede4;border-radius:6px;border:1px dashed var(--border);
      font-size:11px;color:var(--ink4);font-family:IBM Plex Mono,monospace;text-align:center;padding:8px;line-height:1.5">
      해당 전위는<br>이 현 세트에서<br>12프렛 이내 불가</div>`;
  }

  const activeStrNums = new Set(strNums);
  const fretMap = {};
  voicingPoints.forEach(p => { fretMap[p.string] = p; });

  const activeFrets = voicingPoints.map(p => p.fret).filter(f => f > 0);
  const minFret   = activeFrets.length ? Math.min(...activeFrets) : 1;
  const maxFret   = activeFrets.length ? Math.max(...activeFrets) : 4;
  const startFret = minFret <= 1 ? 1 : minFret;
  const endFret   = Math.max(maxFret + 1, startFret + 3);
  const numFrets  = endFret - startFret + 1;

  const N=6, ss=13, fs=18, NR=6, OR=4;
  const pL = startFret>1 ? 26 : 14, pR=10, pT=30, pB=10;
  const bW = ss*(N-1), bH = fs*numFrets;
  const tW = pL+bW+pR, tH = pT+bH+pB;
  const FN = "'IBM Plex Mono', monospace";
  const CN = ['','①','②','③','④','⑤','⑥'];

  let s = `<svg viewBox="0 0 ${tW} ${tH}" xmlns="http://www.w3.org/2000/svg" `
        + `style="width:${tW}px;height:${tH}px;flex-shrink:0;overflow:visible;display:block">`;
  s += `<rect x="0" y="0" width="${tW}" height="${tH}" fill="#ede7d9" rx="5"/>`;

  if (startFret>1)
    s += `<text x="${pL-4}" y="${pT+fs*0.5}" font-family="${FN}" font-size="8" fill="#9a9080" text-anchor="end" dominant-baseline="middle">${startFret}fr</text>`;
  else
    s += `<rect x="${pL}" y="${pT-4}" width="${bW}" height="4" fill="#2c2820" rx="1"/>`;

  for (let f=0; f<=numFrets; f++)
    s += `<line x1="${pL}" y1="${pT+f*fs}" x2="${pL+bW}" y2="${pT+f*fs}" stroke="#9a8f7a" stroke-width="1"/>`;

  for (let ai=0; ai<N; ai++) {
    const sn = 6-ai, x = pL+ai*ss;
    const isAct = activeStrNums.has(sn);
    const th = isAct ? (0.5+((sn-1)/5)*1.8).toFixed(1) : (0.4+((sn-1)/5)*0.8).toFixed(1);
    s += `<line x1="${x}" y1="${pT}" x2="${x}" y2="${pT+bH}" stroke="${isAct?'#8b7355':'#c8bfa8'}" stroke-width="${th}"/>`;
    s += `<text x="${x}" y="${pT-16}" font-family="${FN}" font-size="9" fill="${isAct?'#6b6452':'#b8b0a0'}" text-anchor="middle" dominant-baseline="middle">${CN[sn]}</text>`;
    if (!isAct)
      s += `<text x="${x}" y="${pT-6}" font-family="${FN}" font-size="8" fill="#b8b0a0" text-anchor="middle" dominant-baseline="middle">×</text>`;

    if (isAct && fretMap[ai] !== undefined) {
      const {fret, isRoot} = fretMap[ai];
      const fc = isRoot ? '#a63228' : '#2c5f8a';
      if (fret === 0) {
        s += `<circle cx="${x}" cy="${pT-6}" r="${OR}" fill="#ede7d9" stroke="${fc}" stroke-width="1.8"/>`;
      } else {
        const y = pT+(fret-startFret+0.5)*fs;
        s += `<circle cx="${x}" cy="${y}" r="${NR}" fill="${fc}"/>`;
        if (isRoot)
          s += `<text x="${x}" y="${y}" font-family="${FN}" font-size="6" fill="#f5f0e8" text-anchor="middle" dominant-baseline="middle" font-weight="bold">R</text>`;
      }
    }
  }
  s += `</svg>`;
  return s;
}

// 인터랙티브 보이싱 섹션 HTML 생성

      activeStrNums: new Set(initStrNums),
    });
    const strSymbols = ['','①','②','③','④','⑤','⑥'];
    const noteInfo = voicing0.map(({absIdx, fret, degIdx}) => {
      const noteNm = intervalToNoteName(key, baseIvs0[degIdx], degOffsets0[degIdx]);
      const deg = degLabels0[degIdx] || '';
      return `${strSymbols[6-absIdx]}현 ${fret}fr = ${noteNm}(${deg})`;
    }).join(' · ');
    initNote = `💡 ${SET_LABELS[initSet]} · ${INV_LABELS_MAP['R']} — ${noteInfo}`;
  } else {
    initDiag = `<div style="padding:14px;font-size:12px;color:var(--ink4);font-family:'IBM Plex Mono',monospace;">⚠️ 이 현 세트에서는 해당 전위를 12프렛 이내로 연주하기 어렵습니다.</div>`;
    initNote = '';
  }

  // data-* 속성으로 필요한 정보를 저장 (인라인 script 불필요)
  const ivsEncoded = encodeURIComponent(JSON.stringify(intervals));

  let html = `<div class="voicing-section" id="vs-${uid}" `
           + `data-type="${type}" data-vtype="${voicingType}" data-ivs="${ivsEncoded}">`;
  html += `<div class="voicing-section-title">🎸 ${isClose?'클로즈':'오픈(스프레드)'} 보이싱 폼 예시</div>`;
  html += `<div class="voicing-section-sub">`;
  html += isClose
    ? `클로즈 보이싱 = 구성음을 <strong>인접한 현에 밀집</strong> 배치 · 현 세트와 전위를 선택하면 해당 폼이 자동으로 표시돼요`
    : `오픈 보이싱 = 구성음을 <strong>한 줄 건너뛰어 분산</strong> 배치 · 클로즈보다 넓고 풍성한 소리`;
  html += `</div>`;

  // 현 세트 버튼
  html += `<div class="voicing-controls">`;
  html += `<div class="voicing-ctrl-row"><span class="voicing-ctrl-label">현 세트</span>`;
  sets.forEach((set, i) => {
    html += `<button class="voicing-set-btn${i===0?' active':''}" `
          + `onclick="selectVoicingSet('${uid}','${set}')" data-set="${set}">${SET_LABELS[set]}</button>`;
  });
  html += `</div>`;

  // 전위 버튼
  html += `<div class="voicing-ctrl-row"><span class="voicing-ctrl-label">전위</span>`;
  invKeys.forEach((inv, i) => {
    html += `<button class="voicing-inv-btn${i===0?' active':''}" `
          + `onclick="selectVoicingInv('${uid}','${inv}')" data-inv="${inv}">${INV_LABELS_MAP[inv]}</button>`;
  });
  html += `</div></div>`;

  // 초기 다이어그램 서버사이드 렌더 (스크립트 없이 즉시 표시)
  html += `<div class="voicing-display" id="vd-${uid}">${initDiag}</div>`;
  html += `<div class="voicing-note" id="vn-${uid}">${initNote}</div>`;
  html += `</div>`;

  return html;
}

// 버튼 클릭 전역 핸들러 — data-* 속성에서 직접 읽어 계산
function selectVoicingSet(uid, set) {
  const sec = document.getElementById('vs-'+uid);
  if (!sec) return;
  sec.querySelectorAll('.voicing-set-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.set === set)
  );
  const inv = (sec.querySelector('.voicing-inv-btn.active') || {dataset:{inv:'R'}}).dataset.inv;
  renderVoicingDiagram(uid, set, inv);
}

function selectVoicingInv(uid, inv) {
  const sec = document.getElementById('vs-'+uid);
  if (!sec) return;
  sec.querySelectorAll('.voicing-inv-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.inv === inv)
  );
  const setKeys = Object.keys(VOICING_SETS[sec.dataset.vtype]);

}

// 실제 렌더링 — 새 보이싱 엔진 + 가로형 지판
function renderVoicingDiagram(uid, set, inv) {
  const sec = document.getElementById('vs-'+uid);
  if (!sec) return;
  const type    = sec.dataset.type;
  const vtype   = sec.dataset.vtype;
  const ivs     = JSON.parse(decodeURIComponent(sec.dataset.ivs));
  const strNums = VOICING_SETS[vtype][set];
  const invIdx  = {R:0,'1':1,'2':2}[inv];
  const rootSt  = noteToSemitone(currentKey);
  const baseIvs = ivs.map(i => ((i % 12) + 12) % 12);

  // 새 엔진으로 폼 탐색
  const voicing = findVoicingAuto(rootSt, strNums, invIdx, vtype, baseIvs);

  if (!voicing) {
    document.getElementById('vd-'+uid).innerHTML =
      `<div style="padding:14px;font-size:12px;color:var(--ink4);font-family:'IBM Plex Mono',monospace;">
        ⚠️ 이 현 세트에서는 해당 전위를 12프렛 이내로 연주하기 어렵습니다.
      </div>`;
    document.getElementById('vn-'+uid).textContent = '';
    return;
  }

  // ── 보이싱 포지션 → makeFretboardSVG 형식으로 변환 ──
  // voicing의 음만 표시 (전체 지판 포지션 대신)
  const degreeLabels = ['1','3','5'];
  const degreeOffsets = [0, 2, 4];
  const voicingPos = voicing.map(({absIdx, fret, degIdx}) => {
    const noteSt = ((OPEN_STRINGS[absIdx] + fret) % 12 + 12) % 12;
    const isRoot = noteSt === noteToSemitone(currentKey) % 12;
    const noteNm = intervalToNoteName(currentKey, baseIvs[degIdx], degreeOffsets[degIdx]);
    return {
      string: absIdx,
      fret:   fret,
      note:   noteNm,
      degree: degreeLabels[degIdx] || '',
      isRoot: isRoot,
      isOpen: fret === 0,
    };
  });

  // 전체 지판 표시 (0~15프렛)
  const startFret = 0;
  const endFret   = Math.max(15, Math.max(...voicing.map(p => p.fret)) + 1);

  const activeStrNums = new Set(strNums);

  const svg = makeFretboardSVG(voicingPos, {
    startFret, endFret, width: 700,
    viewMode: currentViewMode,
    activeStrNums,
  });

  document.getElementById('vd-'+uid).innerHTML = svg;

  // 힌트 텍스트: 각 현의 음 정보
  const strSymbols = ['','①','②','③','④','⑤','⑥'];
  const noteInfo = voicing.map(({absIdx, fret, degIdx}) => {
    const noteNm = intervalToNoteName(currentKey, baseIvs[degIdx], degreeOffsets[degIdx]);
    const strNum = 6 - absIdx;
    const deg = degreeLabels[degIdx] || '';
    return `${strSymbols[strNum]}현 ${fret}fr = ${noteNm}(${deg})`;
  }).join(' · ');

  document.getElementById('vn-'+uid).textContent =
    `💡 ${SET_LABELS[set]} · ${INV_LABELS_MAP[inv]} — ${noteInfo}`;
}

// 도수 이름 테이블: 반음 거리 → 도수 표기
const DEGREE_NAMES = {
  0: '1', 1: 'b2', 2: '2', 3: 'b3', 4: '3', 5: '4',
  6: 'b5', 7: '5', 8: '#5', 9: '6', 10: 'b7', 11: '7'
};

// 코드 타입별 특수 도수 재정의 (컨텍스트에 맞게)
const DEGREE_OVERRIDE = {
  'Dom7sus4': { 5: '4' },   // sus4의 4도
  '7#5':      { 8: '#5' },
  'Dim7':     { 9: 'bb7' }, // 감7도
  '13':       { 9: '13' },  // 13도로 표기
};

function getDegreeLabel(relSt, chordType) {
  // L2 override 먼저 확인
  if (chordType && DEGREE_OVERRIDE_L3[chordType] && DEGREE_OVERRIDE_L3[chordType][relSt] !== undefined) {
    return DEGREE_OVERRIDE_L3[chordType][relSt];
  }
  if (chordType && DEGREE_OVERRIDE[chordType] && DEGREE_OVERRIDE[chordType][relSt] !== undefined) {
    return DEGREE_OVERRIDE[chordType][relSt];
  }
  return DEGREE_NAMES[relSt] || String(relSt);
}

// 코드 구성음 이름 배열 반환 (L1 + L2 모두 지원)
function getChordNoteNames(rootNote, chordType) {
  const intervals = CHORD_INTERVALS_L3[chordType] || CHORD_INTERVALS[chordType];
  const degrees   = INTERVAL_DEGREES_L3[chordType] || INTERVAL_DEGREES[chordType] || intervals.map((_,i)=>i);
  return intervals.map((iv, i) => {
    const deg = degrees[i] !== undefined ? degrees[i] : i;
    return intervalToNoteName(rootNote, iv % 12, deg);
  });
}

const SCALE_DEGREES = {
  major:         [0,1,2,3,4,5,6],
  chromatic:     null,
  melodicMinor:  [0,1,2,3,4,5,6],
  wholeTone:     [0,1,2,3,4,6],
  harmonicMinor: [0,1,2,3,4,5,6],   // 1 2 b3 4 5 b6 7
  diminished:    [0,1,2,3,4,5,5,6], // 1 2 b3 4 b5 b6 6 7 — b6·6 모두 6도 letter
};

// 지판 포지션 계산 — 스케일/코드 모두 intervalToNoteName 사용
function getScalePositions(rootNote, intervals, maxFret=12, chordType=null, scaleType=null) {
  const rootSt = noteToSemitone(rootNote);
  const positions = [];
  const normalizedIntervals = intervals.map(iv => ((iv % 12) + 12) % 12);

  // 스케일 degree 테이블 결정
  const scaleDegrees = scaleType ? SCALE_DEGREES[scaleType] : null;
  // 코드 degree 테이블 결정
  const chordDegrees = chordType
    ? (INTERVAL_DEGREES_L3[chordType] || INTERVAL_DEGREES[chordType] || null)
    : null;

  for (let str = 0; str < 6; str++) {
    const openSt = OPEN_STRINGS[str];
    for (let fret = 0; fret <= maxFret; fret++) {
      const noteSt = ((openSt + fret) % 12 + 12) % 12;
      const relSt  = ((noteSt - rootSt) + 12) % 12;
      if (!normalizedIntervals.includes(relSt)) continue;

      // 인터벌 인덱스 (몇 번째 구성음인가)
      const ivIndex = normalizedIntervals.indexOf(relSt);

      let noteName;
      if (scaleDegrees && scaleDegrees[ivIndex] !== undefined) {
        // 스케일: degree 테이블로 정확한 표기
        noteName = intervalToNoteName(rootNote, relSt, scaleDegrees[ivIndex]);
      } else if (chordDegrees && chordDegrees[ivIndex] !== undefined) {
        // 코드: degree 테이블로 정확한 표기
        noteName = intervalToNoteName(rootNote, relSt, chordDegrees[ivIndex]);
      } else {
        // fallback: 플랫/샤프 선택 (크로매틱 등)
        noteName = semitoneToNote(noteSt, !!USE_FLAT[rootNote]);
      }

      const degree = getDegreeLabel(relSt, chordType);
      positions.push({
        string: str, fret, note: noteName, degree,
        isRoot: relSt === 0, isOpen: fret === 0
      });
    }
  }
  return positions;
}

// L2 코드용 getScalePositions 래퍼 — L2 intervals 자동 참조
function getL2ChordPositions(rootNote, chordType, maxFret=12) {
  const intervals = (CHORD_INTERVALS_L3[chordType] || CHORD_INTERVALS[chordType] || [])
    .map(iv => iv % 12);
  return getScalePositions(rootNote, intervals, maxFret, chordType);
}

// ════════════════════════════════════════════════
// SVG FRETBOARD RENDERER
// ════════════════════════════════════════════════

function makeFretboardSVG(positions, options={}) {
  const {
    startFret = 0,
    endFret = 12,
    width = 560,
    viewMode = 'note',   // 'note' | 'degree'
    activeStrNums = null, // Set of string numbers (1~6) to highlight; null = all active
  } = options;

  const numFrets = endFret - startFret;

  // ── 레이아웃 상수 ──────────────────────────────
  const NUM_STRINGS   = 6;
  const STRING_SPACING = 16;
  const FRET_DOT_R    = 3;
  const NOTE_R        = 7;   // 음표 원 반지름

  // 개방현 표시 여부
  const showOpen = startFret === 0;

  // 구역 너비 정의
  const LABEL_W  = 16;   // 줄 이름 라벨 영역 너비
  const OPEN_W   = showOpen ? 20 : 0;  // 개방현 음표 영역 너비
  const NUT_W    = showOpen ? 6  : 0;  // 너트 너비

  const padTop   = 14;
  const padBot   = 22;
  const padLeft  = LABEL_W + OPEN_W + NUT_W + 4;  // 총 왼쪽 여백
  const padRight = 16;

  const strAreaH = STRING_SPACING * (NUM_STRINGS - 1);  // 5 * 16 = 80
  const totalH   = padTop + strAreaH + padBot;
  const w        = width;
  const fretW    = (w - padLeft - padRight) / numFrets;

  // x 기준점: 프렛 영역 시작 = padLeft
  const fretX    = padLeft;
  // 너트 x: 프렛 영역 바로 앞
  const nutX     = fretX - NUT_W;
  // 개방현 음표 x 중심: 너트 왼쪽, OPEN_W 영역 중앙
  const openNoteX = nutX - OPEN_W / 2;
  // 줄 라벨 x 중심: 맨 왼쪽 LABEL_W 영역 중앙
  const labelX   = LABEL_W / 2;

  // 줄 y 좌표 헬퍼: row 0 = high e (상단), row 5 = low E (하단)
  const strY  = (row) => padTop + row * STRING_SPACING;
  // string index 0=low E → row 5 (하단)
  const toRow = (strIdx) => NUM_STRINGS - 1 - strIdx;
  // strIdx(0=lowE=6번줄) → strNum(1~6): 6번줄=strNum6, 1번줄=strNum1
  const toStrNum = (strIdx) => NUM_STRINGS - strIdx;

  const fretDotPositions = [3,5,7,9,12];
  const FONT = "'IBM Plex Mono', 'IBM Plex Sans KR', monospace";

  let svg = `<svg viewBox="0 0 ${w} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;

  // ── 배경 ─────────────────────────────────────
  svg += `<rect width="${w}" height="${totalH}" fill="#ede7d9" rx="4"/>`;

  // ── 프렛 포지션 마커 (지판 중앙) ──────────────
  const dotY = padTop + strAreaH / 2;
  fretDotPositions.forEach(fp => {
    if (fp > startFret && fp <= endFret) {
      const cx = fretX + (fp - startFret - 0.5) * fretW;
      if (fp === 12) {
        svg += `<circle cx="${cx - fretW*0.25}" cy="${dotY}" r="${FRET_DOT_R}" fill="#c8bfa8"/>`;
        svg += `<circle cx="${cx + fretW*0.25}" cy="${dotY}" r="${FRET_DOT_R}" fill="#c8bfa8"/>`;
      } else {
        svg += `<circle cx="${cx}" cy="${dotY}" r="${FRET_DOT_R}" fill="#c8bfa8"/>`;
      }
    }
  });

  // ── 너트 ─────────────────────────────────────
  if (showOpen) {
    svg += `<rect x="${nutX}" y="${strY(0)}" width="${NUT_W - 1}" height="${strAreaH}" fill="#2c2820" rx="1"/>`;
  }

  // ── 프렛 선 ───────────────────────────────────
  const fretStart = showOpen ? 1 : 0;
  for (let f = fretStart; f <= numFrets; f++) {
    const x = fretX + f * fretW;
    svg += `<line x1="${x}" y1="${strY(0)}" x2="${x}" y2="${strY(5)}" stroke="#9a8f7a" stroke-width="1.2"/>`;
  }

  // ── 줄 선 ────────────────────────────────────
  // strIdx 0=low E(굵음)→row5, strIdx 5=high e(얇음)→row0
  for (let strIdx = 0; strIdx < NUM_STRINGS; strIdx++) {
    const row = toRow(strIdx);
    const y   = strY(row);
    const strNum = toStrNum(strIdx);
    const isActive = !activeStrNums || activeStrNums.has(strNum);
    const thickness = 0.7 + ((NUM_STRINGS - 1 - strIdx) / (NUM_STRINGS - 1)) * 1.7;
    const x1 = showOpen ? nutX : fretX;
    // 비활성 현: 연하게
    const strokeColor = isActive ? '#8b7355' : '#d0c8b4';
    const strokeW = isActive ? thickness : thickness * 0.5;
    svg += `<line x1="${x1}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="${strokeColor}" stroke-width="${strokeW.toFixed(2)}"/>`;
  }

  // ── 줄 이름 라벨 (맨 왼쪽 구역) ─────────────
  const strLabels = ['e','B','G','D','A','E'];
  for (let row = 0; row < NUM_STRINGS; row++) {
    const strIdx = NUM_STRINGS - 1 - row; // row→strIdx
    const strNum = toStrNum(strIdx);
    const isActive = !activeStrNums || activeStrNums.has(strNum);
    const y = strY(row);
    svg += `<text x="${labelX}" y="${y}" font-family="${FONT}" font-size="9" fill="${isActive ? '#9a9080' : '#ccc8be'}" text-anchor="middle" dominant-baseline="middle">${strLabels[row]}</text>`;
  }

  // ── 프렛 번호 (하단) ──────────────────────────
  for (let f = 1; f <= numFrets; f++) {
    const fn = f + startFret;
    const x  = fretX + (f - 0.5) * fretW;
    svg += `<text x="${x}" y="${strY(5) + 15}" font-family="${FONT}" font-size="8" fill="#9a9080" text-anchor="middle">${fn}</text>`;
  }

  // ── 음표 렌더링 ───────────────────────────────
  const rendered = new Set();

  positions.forEach(p => {
    if (p.fret < startFret || p.fret > endFret) return;

    const key = `${p.string}_${p.fret}`;
    if (rendered.has(key)) return;
    rendered.add(key);

    const strNum = toStrNum(p.string);
    const isActive = !activeStrNums || activeStrNums.has(strNum);

    const row = toRow(p.string);
    const y   = strY(row);
    let x;

    if (p.fret === 0) {
      x = openNoteX;
    } else {
      x = fretX + (p.fret - startFret - 0.5) * fretW;
    }

    const label = (viewMode === 'degree') ? p.degree : p.note;

    if (!isActive) {
      // 비활성 현의 음표: 매우 흐리게
      svg += `<circle cx="${x}" cy="${y}" r="${NOTE_R}" fill="#e0dbd0" opacity="0.5"/>`;
      return;
    }

    // 루트음
    if (p.isRoot) {
      svg += `<circle cx="${x}" cy="${y}" r="${NOTE_R}" fill="#a63228"/>`;
      // 음이름 모드: 실제 음이름(C, G, Bb 등) / 도수 모드: 1
      const rootLabel = viewMode === 'degree' ? '1' : (p.note || 'R');
      svg += `<text x="${x}" y="${y}" font-family="${FONT}" font-size="7" fill="#f5f0e8" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${rootLabel}</text>`;
    }
    // 개방현(비루트)
    else if (p.fret === 0) {
      svg += `<circle cx="${x}" cy="${y}" r="${NOTE_R}" fill="#f5f0e8" stroke="#2c5f8a" stroke-width="1.8"/>`;
      svg += `<text x="${x}" y="${y}" font-family="${FONT}" font-size="6.5" fill="#2c5f8a" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
    }
    // 일반 음표
    else {
      svg += `<circle cx="${x}" cy="${y}" r="${NOTE_R}" fill="#2c5f8a"/>`;
      svg += `<text x="${x}" y="${y}" font-family="${FONT}" font-size="6.5" fill="#f5f0e8" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
    }
  });

  svg += `</svg>`;
  return svg;
}

// Chord diagram (vertical, traditional style)
function makeChordDiagramSVG(voicing, rootNote) {
  if (!voicing) return '<div style="color:#9a9080;font-size:12px;padding:10px;">폼 데이터 준비 중</div>';

  const frets = voicing.map(v => v.f).filter(f => f > 0);
  if (frets.length === 0) return '<div style="color:#9a9080;font-size:12px;">개방 코드</div>';

  const minFret = Math.min(...frets);
  const maxFret = Math.max(...frets);
  const startFret = minFret > 1 ? minFret : 1;
  const endFret = Math.max(maxFret, startFret + 3);
  const numFrets = endFret - startFret + 1;

  const w = 120, h = 100;
  const padL = 18, padR = 18, padT = 16, padB = 16;
  const strSpacing = (w - padL - padR) / 5;
  const fretSpacing = (h - padT - padB) / (numFrets);

  let svg = `<svg viewBox="0 0 ${w} ${h+padT+padB}" xmlns="http://www.w3.org/2000/svg" style="width:${w}px;height:auto;flex-shrink:0">`;
  svg += `<rect width="${w}" height="${h+padT+padB}" fill="#ede7d9"/>`;

  // Fret position indicator
  if (startFret > 1) {
    svg += `<text x="${padL-14}" y="${padT + fretSpacing*0.5 + 4}" font-family="IBM Plex Mono,monospace" font-size="9" fill="#6b6452">${startFret}fr</text>`;
  }

  // Nut
  if (startFret === 1) {
    svg += `<rect x="${padL}" y="${padT-3}" width="${5*strSpacing}" height="5" fill="#2c2820" rx="1"/>`;
  }

  // Fret lines
  for (let f = 0; f <= numFrets; f++) {
    const y = padT + f * fretSpacing;
    svg += `<line x1="${padL}" y1="${y}" x2="${padL + 5*strSpacing}" y2="${y}" stroke="#9a8f7a" stroke-width="${f===0?0:1}"/>`;
  }

  // String lines
  for (let s = 0; s < 6; s++) {
    const x = padL + s * strSpacing;
    svg += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+h}" stroke="#8b7355" stroke-width="${0.8 + ((5-s)/5)*1.5}"/>`;
  }

  // Notes
  voicing.forEach((v, idx) => {
    // idx 0 = low E (string 6), idx 5 = high E (string 1)
    // Display: idx 0 at left, idx 5 at right
    const x = padL + idx * strSpacing;

    if (v.f === -1) {
      // Muted
      svg += `<text x="${x}" y="${padT-5}" font-family="IBM Plex Mono,monospace" font-size="9" fill="#9a9080" text-anchor="middle">✕</text>`;
    } else if (v.f === 0) {
      // Open
      svg += `<circle cx="${x}" cy="${padT-6}" r="4" fill="none" stroke="#2c5f8a" stroke-width="1.5"/>`;
    } else {
      const y = padT + (v.f - startFret + 0.5) * fretSpacing;
      const isRoot = semitoneIsRoot(idx, v.f, rootNote);
      svg += `<circle cx="${x}" cy="${y}" r="6" fill="${isRoot ? '#a63228' : '#2c5f8a'}"/>`;
      if (isRoot) {
        svg += `<text x="${x}" y="${y+3}" font-family="IBM Plex Mono,monospace" font-size="6.5" fill="#f5f0e8" text-anchor="middle" font-weight="bold">R</text>`;
      }
    }
  });

  svg += `</svg>`;
  return svg;
}

function semitoneIsRoot(strIdx, fret, rootNote) {
  const openStr = OPEN_STRINGS[strIdx]; // strIdx 0=low E
  const noteSt = (openStr + fret) % 12;
  return noteSt === noteToSemitone(rootNote);
}

// RENDER SECTIONS
// ════════════════════════════════════════════════

let currentKey = 'C';
let currentSection = 'scales';
let currentViewMode = 'note';   // 'note' | 'degree'

function setViewMode(mode) {
  currentViewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  // 범례 업데이트
  const rootLegend = document.querySelector('.legend-root-label');
  if (rootLegend) rootLegend.textContent = mode === 'degree' ? '1 (루트)' : '루트음';
  renderCurrent();
}

function renderScales(key) {
  let html = '';

  // ── 하모닉 마이너 스케일 ──────────────────────
  // W H W W H A H (A = 증2도 = 3반음)
  // 도수: 1 2 b3 4 5 b6 7
  const hmDegrees = [0,1,2,3,4,5,6];
  const hmNotes = SCALES.harmonicMinor.map((iv,i) =>
    intervalToNoteName(key, iv, hmDegrees[i])
  ).join(' · ');

  html += `<div class="diagram-group">`;
  html += `<div class="group-title">하모닉 마이너 스케일 <span class="group-subtitle">Harmonic Minor Scale — 2 Octaves · 16분음표 ♩=60</span></div>`;
  html += `<div class="formula-box">`;
  html += `<strong>음정 공식:</strong> W H W W H A H (온음 반음 온음 온음 반음 <strong>증2도</strong> 반음)<br>`;
  html += `<strong>멜로딕 마이너와 차이:</strong> b6도 (6번째 음이 반음 낮음) · 증2도 구간이 특징적인 색깔<br>`;
  html += `<strong>구성음 (${key}):</strong> ${hmNotes}<br>`;
  html += `<strong>스케일 도수:</strong> 1 &nbsp;·&nbsp; 2 &nbsp;·&nbsp; b3 &nbsp;·&nbsp; 4 &nbsp;·&nbsp; 5 &nbsp;·&nbsp; b6 &nbsp;·&nbsp; 7`;
  html += `</div>`;

  const hmPos = getScalePositions(key, SCALES.harmonicMinor, 12, null, 'harmonicMinor');
  html += `<div class="fb-card" style="width:100%">`;
  html += `<div class="fb-card-title">${key} Harmonic Minor Scale — 전체 지판 (Fret 1-12)</div>`;
  html += `<div class="fb-card-sub">파란 점: 스케일음 · 빨간 R: 루트음 · 증2도(b6→7) 구간에 주목하세요</div>`;
  html += makeFretboardSVG(hmPos, {startFret:0, endFret:12, width:700, viewMode:currentViewMode});
  html += `</div></div>`;

  // ── 디미니쉬드 스케일 (온음-반음) ───────────────
  // W H W H W H W H (8음계 대칭)
  // 도수: 1 2 b3 4 b5 b6(#5) 6 7
  const dimDegrees = [0,1,2,3,4,5,5,6]; // b5와 #5가 다른 letter에서 옴
  // 디미니쉬드는 대칭이라 모든 키에서 동일 패턴 — degree 조심
  const dimNotes = SCALES.diminished.map((iv,i) =>
    intervalToNoteName(key, iv, [0,1,2,3,4,5,6,7][i])
  ).join(' · ');

  html += `<div class="diagram-group">`;
  html += `<div class="group-title">디미니쉬드 스케일 <span class="group-subtitle">Diminished Scale (W-H) — 2 Octaves · 16분음표 ♩=60</span></div>`;
  html += `<div class="formula-box">`;
  html += `<strong>음정 공식:</strong> W H W H W H W H (온음-반음 교대 · 8음계)<br>`;
  html += `<strong>특징:</strong> 3개의 디미니쉬드 스케일만 존재 (C계열 / C#계열 / D계열) · 완전 대칭<br>`;
  html += `<strong>구성음 (${key}):</strong> ${dimNotes}<br>`;
  html += `<strong>스케일 도수:</strong> 1 &nbsp;·&nbsp; 2 &nbsp;·&nbsp; b3 &nbsp;·&nbsp; 4 &nbsp;·&nbsp; b5 &nbsp;·&nbsp; b6 &nbsp;·&nbsp; 6 &nbsp;·&nbsp; 7`;
  html += `</div>`;

  const dimPos = getScalePositions(key, SCALES.diminished, 12, null, 'diminished');
  html += `<div class="fb-card" style="width:100%">`;
  html += `<div class="fb-card-title">${key} Diminished Scale (W-H) — 전체 지판</div>`;
  html += `<div class="fb-card-sub">파란 점: 스케일음 · 빨간 R: 루트음 · 3프렛 간격 반복 패턴에 주목하세요</div>`;
  html += makeFretboardSVG(dimPos, {startFret:0, endFret:12, width:700, viewMode:currentViewMode});
  html += `</div></div>`;

  return html;
}

function renderTriads(key) {
  // Level III: 장(Maj) · 단(Min) 오픈 보이싱만
  const types = ['Maj','Min'];
  const typeNames = {
    'Maj': '장3화음 (Major Triad) · 음정: 1 3 5',
    'Min': '단3화음 (Minor Triad) · 음정: 1 b3 5',
  };
  const formulas = {
    'Maj': '루트(1도) + 장3도 + 완전5도',
    'Min': '루트(1도) + 단3도(b3) + 완전5도',
  };

  let html = '';

  // Level 3 안내 배너
  html += `<div class="hint-box" style="margin-bottom:20px">📌 <strong>Level III 요구사항:</strong> 장(Maj) · 단(Min) 3화음만 · <strong>오픈(스프레드) 보이싱</strong> · 임의 전위에서 시작 · 1옥타브</div>`;

  types.forEach(type => {
    const intervals = CHORD_INTERVALS[type];
    const notes = getChordNoteNames(key, type).join(' · ');

    html += `<div class="diagram-group">`;
    html += `<div class="group-title">${key} ${typeNames[type]}</div>`;
    html += `<div class="formula-box"><strong>구성음:</strong> ${notes} &nbsp;·&nbsp; <strong>구조:</strong> ${formulas[type]}</div>`;

    const pos = getScalePositions(key, intervals, 12, type);
    html += `<div class="fb-card" style="width:100%">`;
    html += `<div class="fb-card-title">${key}${type} — 지판 전체 구성음 위치</div>`;
    html += `<div class="fb-card-sub">빨간 <strong>R</strong> = 루트음 · 파란 점 = 나머지 구성음 · 루트를 찾고 주변 구성음을 연결하면 폼이 완성돼요</div>`;
    html += makeFretboardSVG(pos, {startFret:0, endFret:12, width:700, viewMode:currentViewMode});
    html += `</div>`;

    // 인터랙티브 오픈 보이싱
    html += makeInteractiveVoicingSection(type, 'open', key+type+'open', key, intervals);


    html += `</div>`;
  });

  return html;
}

function renderFourPart(key) {
  // Level III: Level I과 동일 14종, 각 2개 폼 요구
  const chords = ['Maj7','Min7','Dom7','Min7b5','Dom7sus4','7#5','Dim7',
                  'Maj6','Min6','Min9','9','7b9','7#9','13'];

  const chordInfo = {
    'Maj7':     {formula:'1 3 5 7',      struct:'메이저 트라이어드 + 장7도'},
    'Min7':     {formula:'1 b3 5 b7',    struct:'마이너 트라이어드 + 단7도'},
    'Dom7':     {formula:'1 3 5 b7',     struct:'메이저 트라이어드 + 단7도'},
    'Min7b5':   {formula:'1 b3 b5 b7',   struct:'감 트라이어드 + 단7도'},
    'Dom7sus4': {formula:'1 4 5 b7',     struct:'sus4 트라이어드 + 단7도'},
    '7#5':      {formula:'1 3 #5 b7',    struct:'증 트라이어드 + 단7도'},
    'Dim7':     {formula:'1 b3 b5 bb7',  struct:'감 트라이어드 + 감7도'},
    'Maj6':     {formula:'1 3 5 6',      struct:'메이저 트라이어드 + 장6도'},
    'Min6':     {formula:'1 b3 5 6',     struct:'마이너 트라이어드 + 장6도'},
    'Min9':     {formula:'1 b3 5 b7 9',  struct:'Min7 + 장9도'},
    '9':        {formula:'1 3 5 b7 9',   struct:'Dom7 + 장9도'},
    '7b9':      {formula:'1 3 5 b7 b9',  struct:'Dom7 + 단9도'},
    '7#9':      {formula:'1 3 5 b7 #9',  struct:'Dom7 + 증9도'},
    '13':       {formula:'1 3 5 b7 9 13',struct:'Dom7 + 장13도'},
  };

  let html = '';
  html += `<div class="hint-box" style="margin-bottom:20px">📌 <strong>Level III 요구사항:</strong> Level I과 동일한 14종 · <strong>각 2개 폼</strong>을 숙지하세요</div>`;

  chords.forEach(chord => {
    const intervals = (CHORD_INTERVALS[chord] || []).map(iv => iv % 12);
    const notes = getChordNoteNames(key, chord).join(' · ');
    const info = chordInfo[chord] || {formula:'', struct:''};
    const koName = CHORD_NAMES_KO[chord] || chord;

    html += `<div class="diagram-group">`;
    html += `<div class="group-title">${key}${chord} <span class="group-subtitle">${koName} · ${info.formula}</span></div>`;
    html += `<div class="formula-box"><strong>구성음:</strong> ${notes} &nbsp;·&nbsp; <strong>구조:</strong> ${info.struct}</div>`;

    const pos = getScalePositions(key, intervals, 12, chord);
    html += `<div class="fb-card" style="width:100%">`;
    html += `<div class="fb-card-title">${key}${chord} — 지판 전체 구성음 위치</div>`;
    html += `<div class="fb-card-sub">빨간 <strong>R</strong> = 루트음 · 파란 점 = 나머지 구성음 · 루트를 찾고 주변 구성음을 연결하면 폼이 완성돼요</div>`;
    html += makeFretboardSVG(pos, {startFret:0, endFret:12, width:700, viewMode:currentViewMode});
    html += `</div>`;

    // Drop 2/3 보이싱 섹션
    html += makeDropVoicingSection(chord, key, intervals);


    html += `</div>`;
  });

  return html;
}

// ════════════════════════════════════════════════
// UI CONTROL
// ════════════════════════════════════════════════

function renderCurrent() {
  const key = currentKey;
  const sec = currentSection;

  let html = '';
  if (sec === 'scales') html = renderScales(key);
  else if (sec === 'triads') html = renderTriads(key);
  else if (sec === 'fourpart') html = renderFourPart(key);

  document.getElementById(`panel-${sec}`).innerHTML = html;
}

function selectKey(k) {
  currentKey = k;
  document.querySelectorAll('.key-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.replace('♭','b') === k || b.textContent === k);
  });
  renderCurrent();
}

function switchSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.sec-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.sec-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${sec}`).classList.add('active');
  // 모든 섹션에서 토글 표시
  document.getElementById('viewToggle').style.display = 'flex';
  renderCurrent();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Initial render
document.getElementById('viewToggle').style.display = 'flex';
renderCurrent();
